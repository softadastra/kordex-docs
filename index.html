    <style>
      :root {
        --kx-loading-bg: #0e1117;
        --kx-loading-dot: #ff9900;
        --kx-loading-cream: #fceccf;
      }

      #app-loading {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background:
          radial-gradient(
            circle at 50% 42%,
            rgba(255, 153, 0, 0.12),
            transparent 34%
          ),
          linear-gradient(180deg, #101218 0%, var(--kx-loading-bg) 100%);
        opacity: 1;
        visibility: visible;
        transition:
          opacity 180ms ease,
          visibility 0ms linear 180ms;
      }

      #app-loading.is-hiding {
        opacity: 0;
        visibility: hidden;
      }

      .kx-loader {
        display: grid;
        gap: 22px;
        justify-items: center;
      }

      .kx-loader-mark {
        width: 72px;
        height: 72px;
        object-fit: contain;
        filter: drop-shadow(0 18px 34px rgba(255, 153, 0, 0.22));
      }

      .kx-loader-dots {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .kx-loader-dots span {
        width: 14px;
        height: 14px;
        border-radius: 999px;
        background: var(--kx-loading-dot);
        opacity: 0.25;
        transform: translateY(0);
        animation: kxDot 1.15s ease-in-out infinite;
        box-shadow: 0 0 26px rgba(255, 153, 0, 0.35);
      }

      .kx-loader-dots span:nth-child(2) {
        background: var(--kx-loading-cream);
        animation-delay: 0.15s;
      }

      .kx-loader-dots span:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes kxDot {
        0%,
        100% {
          transform: translateY(0);
          opacity: 0.25;
        }

        40% {
          transform: translateY(-10px);
          opacity: 0.95;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .kx-loader-dots span {
          animation: none;
          opacity: 0.65;
        }
      }
    </style>
  </head>

  <body>
    <div id="app-loading" aria-label="Loading Kordex">
      <div class="kx-loader" aria-hidden="true">
        <img class="kx-loader-mark" src="/logo.svg" alt="" />

        <div class="kx-loader-dots">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </div>

    <div id="app"></div>

    <script type="module" src="/src/main.js"></script>

    <script>
      window.addEventListener("load", function () {
        const loader = document.getElementById("app-loading");

        if (!loader) {
          return;
        }

        loader.classList.add("is-hiding");

        window.setTimeout(function () {
          loader.remove();
        }, 240);
      });
    </script>
  </body>
